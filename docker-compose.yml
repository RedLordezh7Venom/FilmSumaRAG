version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: filmsuma_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-filmsuma_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend_fastapi
      dockerfile: Dockerfile
    container_name: filmsuma_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./backend_fastapi/.env
    environment:
      # Automatically use the db service name for the URL inside Docker
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-filmsuma_db}
    volumes:
      # Mount persistent storage for ChromaDB and transcripts
      - ./backend_fastapi/chroma_db:/app/chroma_db
      - ./backend_fastapi/data:/app/data

  # Future frontend service (commented out until build is finalized)
  # frontend:
  #   build: ./frontend_next
  #   container_name: filmsuma_frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
